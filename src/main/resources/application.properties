spring.application.name=parallel

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mariadb://localhost:3306/parallel_batch?rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.batch.jdbc.initialize-schema=never

# Configurazione File Input
batch.input.file.name=people-10000.csv

# Configurazione Parallelismo (Numero di thread/partizioni)
batch.grid.size=4

# Configurazione Transazionale (Record per ogni commit DB)
batch.chunk.size=500

batch.input.file.lines=10000